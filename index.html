<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>济事楼导览系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 25px;
        }

        header h1 {
            color: white;
            font-size: 2.5rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            margin-bottom: 10px;
        }

        header p {
            color: rgba(255,255,255,0.8);
            font-size: 1.1rem;
        }

        .search-bar {
            text-align: center;
            margin-bottom: 25px;
        }

        .search-bar input {
            width: 400px;
            padding: 12px 20px;
            border: none;
            border-radius: 25px;
            font-size: 16px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            outline: none;
            transition: width 0.3s;
        }

        .search-bar input:focus {
            width: 500px;
        }

        .search-bar button {
            margin-left: 10px;
            padding: 12px 30px;
            background: #ff6b6b;
            color: white;
            border: none;
            border-radius: 25px;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.3s, transform 0.2s;
            box-shadow: 0 4px 15px rgba(255,107,107,0.4);
        }

        .search-bar button:hover {
            background: #ff5252;
            transform: translateY(-2px);
        }

        /* 房间号快捷按钮区域 */
        .room-buttons {
            background: white;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 25px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.15);
        }

        .room-buttons .label {
            text-align: center;
            color: #666;
            margin-bottom: 15px;
            font-weight: bold;
        }

        .room-buttons .buttons-row {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 8px;
        }

        .room-btn {
            width: 55px;
            height: 40px;
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 2px 8px rgba(79,172,254,0.4);
        }

        .room-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(79,172,254,0.6);
        }

        .room-btn.active {
            background: linear-gradient(135deg, #ff6b6b 0%, #ff8e53 100%);
            box-shadow: 0 4px 12px rgba(255,107,107,0.6);
        }

        /* 图片展示区域 */
        .image-display {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.15);
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .nav-btn {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
            border: none;
            border-radius: 50%;
            font-size: 24px;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 12px rgba(79,172,254,0.4);
            flex-shrink: 0;
        }

        .nav-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 6px 16px rgba(79,172,254,0.6);
        }

        .image-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .room-image {
            width: 100%;
            max-width: 600px;
            height: 400px;
            object-fit: cover;
            border-radius: 10px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.15);
        }

        .room-info {
            margin-top: 20px;
            text-align: center;
        }

        .room-info .room-number {
            font-size: 2rem;
            font-weight: bold;
            color: #4facfe;
            margin-bottom: 10px;
        }

        .room-info .room-name {
            font-size: 1.3rem;
            color: #333;
            margin-bottom: 10px;
        }

        .room-info .room-people {
            font-size: 1rem;
            color: #666;
        }

        .room-info .person-tag {
            display: inline-block;
            background: #e3f2fd;
            color: #1976d2;
            padding: 5px 12px;
            border-radius: 15px;
            margin: 5px;
            font-size: 0.9rem;
        }

        /* 房间列表区域 */
        .floors {
            margin-top: 25px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 20px;
        }

        .floor-section {
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.15);
            overflow: hidden;
        }

        .floor-header {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
            padding: 15px;
            font-size: 1.3rem;
            font-weight: bold;
        }

        .rooms-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            padding: 15px;
        }

        .room-card {
            background: #f8f9fa;
            border-radius: 8px;
            padding: 12px;
            cursor: pointer;
            transition: all 0.3s;
            border: 2px solid transparent;
            text-align: center;
        }

        .room-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.1);
            border-color: #4facfe;
        }

        .room-card.active {
            border-color: #ff6b6b;
            background: #fff3f3;
        }

        .room-card .card-number {
            font-size: 1.2rem;
            font-weight: bold;
            color: #333;
        }

        .room-card .card-name {
            font-size: 0.9rem;
            color: #666;
            margin-top: 3px;
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #888;
        }

        @media (max-width: 768px) {
            header h1 {
                font-size: 1.8rem;
            }

            .search-bar input {
                width: 100%;
                margin-bottom: 10px;
            }

            .search-bar button {
                width: 100%;
                margin-left: 0;
            }

            .image-display {
                flex-direction: column;
            }

            .nav-btn {
                width: 40px;
                height: 40px;
                font-size: 18px;
            }

            .room-image {
                height: 250px;
            }

            .rooms-grid {
                grid-template-columns: 1fr;
            }

            .floors {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

        <div class="search-bar">

            <button onclick="searchRooms()">搜索</button>
        </div>

        <!-- 房间号快捷按钮 -->
        <div class="room-buttons">
            <div class="label">点击下方按钮快速定位房间</div>
            <div class="buttons-row" id="roomButtonsContainer">
                <!-- 按钮将通过JavaScript动态生成 -->
            </div>
        </div>

        <!-- 图片展示区域 -->
        <div class="image-display">
            <button class="nav-btn" onclick="prevRoom()">‹</button>
            <div class="image-container">

        // 页面加载时初始化

            // 构建所有房间列表
            for (const floor of Object.keys(allRooms)) {
                allRoomsList = allRoomsList.concat(allRooms[floor]);
            }
            
            renderRoomButtons();
            renderRooms(allRooms);
            showRoom(allRoomsList[0]);
        });

        // 渲染房间号按钮
        function renderRoomButtons() {
            const container = document.getElementById('roomButtonsContainer');
            container.innerHTML = '';
            
            for (const room of allRoomsList) {
                const btn = document.createElement('button');
                btn.className = 'room-btn';
                btn.textContent = room.room_number;
                btn.onclick = () => selectRoom(room.room_number);
                container.appendChild(btn);
            }
        }

        // 渲染房间列表
        function renderRooms(rooms) {
            const container = document.getElementById('floorsContainer');
            container.innerHTML = '';

            let hasRooms = false;

            for (const floor of Object.keys(rooms)) {
                if (rooms[floor].length === 0) continue;
                hasRooms = true;

                const floorSection = document.createElement('div');
                floorSection.className = 'floor-section';
                
                floorSection.innerHTML = `
                    <div class="floor-header">${floor}</div>
                    <div class="rooms-grid">
                        ${rooms[floor].map(room => `
                            <div class="room-card" onclick="selectRoom('${room.room_number}')">
                                <div class="card-number">${room.room_number}</div>
                                <div class="card-name">${room.name}</div>
                            </div>
                        `).join('')}
                    </div>
                `;
                
                container.appendChild(floorSection);
            }

            if (!hasRooms) {
                container.innerHTML = `
                    <div class="empty-state">
                        <h3>未找到匹配的房间</h3>
                        <p>请尝试其他搜索关键词</p>
                    </div>
                `;
            }
        }

        // 搜索房间

                return;
            }

            const results = {"4楼": [], "5楼": []};
            
            for (const floor of Object.keys(allRooms)) {
                for (const room of allRooms[floor]) {
                    if (room.room_number.includes(keyword) || 
                        room.name.includes(keyword) ||
                        room.people.some(person => person.includes(keyword))) {
                        results[floor].push(room);
                    }
                }
            }
            
            renderRooms(results);
            
            // 如果有搜索结果，直接显示第一个匹配的房间图片
            const allResults = [...results["4楼"], ...results["5楼"]];
            if (allResults.length > 0) {
                showRoom(allResults[0]);
            }
        }

        function handleKeyup() {
            if (event.key === 'Enter') {
                searchRooms();
            }
        }

        // 选择房间
        function selectRoom(roomNumber) {
            const room = allRoomsList.find(r => r.room_number === roomNumber);
            if (room) {
                showRoom(room);
            }
        }

        // 显示房间信息和图片
        function showRoom(room) {
            // 更新当前索引
            currentIndex = allRoomsList.findIndex(r => r.room_number === room.room_number);
            
            // 更新图片（使用房间数据中定义的image字段）
            document.getElementById('roomImage').src = room.image;
            
            // 更新房间信息
            document.getElementById('displayRoomNumber').textContent = room.room_number;
            document.getElementById('displayRoomName').textContent = room.name;
            
            // 更新人员标签
            if (room.people.length > 0) {
                document.getElementById('displayRoomPeople').innerHTML = 
                    room.people.map(p => `<span class="person-tag">${p}</span>`).join('');
            } else {
                document.getElementById('displayRoomPeople').innerHTML = '<span class="person-tag" style="background:#f0f0f0;color:#999;">暂无人员</span>';
            }
            
            // 更新按钮和卡片的激活状态
            updateActiveState(room.room_number);
        }

        // 更新激活状态
        function updateActiveState(roomNumber) {
            // 更新按钮状态
            document.querySelectorAll('.room-btn').forEach(btn => {
                btn.classList.toggle('active', btn.textContent === roomNumber);
            });
            
            // 更新卡片状态
            document.querySelectorAll('.room-card').forEach(card => {
                card.classList.toggle('active', card.querySelector('.card-number').textContent === roomNumber);
            });
        }

        // 上一个房间
        function prevRoom() {
            currentIndex = (currentIndex - 1 + allRoomsList.length) % allRoomsList.length;
            showRoom(allRoomsList[currentIndex]);
        }

        // 下一个房间
        function nextRoom() {
            currentIndex = (currentIndex + 1) % allRoomsList.length;
            showRoom(allRoomsList[currentIndex]);
        }
    </script>
</body>
</html>
